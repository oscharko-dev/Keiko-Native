name: CI

on:
  pull_request:
    branches:
      - main
      - dev
  push:
    branches:
      - main
      - dev
      - "release/**"
  workflow_dispatch:

permissions: {}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core-quality:
    name: Core quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.18.0"
          package-manager-cache: false
      - run: npm ci --ignore-scripts
      - run: npm run quality
      - run: npm audit --audit-level=high

  coverage-sonar:
    name: Coverage and SonarCloud
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.18.0"
          package-manager-cache: false
      - run: npm ci --ignore-scripts
      - run: npm run coverage
      - name: Download and verify Sonar Scanner CLI
        run: |
          scanner_zip="$RUNNER_TEMP/sonar-scanner-cli.zip"
          curl --proto '=https' -sSfL -o "$scanner_zip" "https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-8.1.0.6389-linux-x64.zip"
          echo "bb8f709f9cb73352f8d1260a3b3c506c0f41146754bc630762c126d795499d0b  $scanner_zip" | sha256sum --check
          unzip -q "$scanner_zip" -d "$RUNNER_TEMP"
          echo "SONAR_SCANNER_HOME=$RUNNER_TEMP/sonar-scanner-8.1.0.6389-linux-x64" >> "$GITHUB_ENV"
      - name: SonarQube Cloud analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -z "$SONAR_TOKEN" ]; then
            echo "SONAR_TOKEN is required for exact-head SonarQube Cloud evidence."
            exit 1
          fi
          "$SONAR_SCANNER_HOME/bin/sonar-scanner" \
            -Dsonar.projectBaseDir="$GITHUB_WORKSPACE" \
            -Dsonar.projectVersion="$(node -p "require('./package.json').version")" \
            -Dsonar.qualitygate.wait=true \
            -Dsonar.working.directory="$RUNNER_TEMP/sonar-work"

  cross-platform-smoke:
    name: Cross-platform smoke (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.18.0"
          package-manager-cache: false
      - run: npm ci --ignore-scripts
      - run: npm run check:contract
      - run: npm test
      - run: npm run build

  ci:
    name: ci
    if: ${{ always() }}
    needs:
      - core-quality
      - coverage-sonar
      - cross-platform-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions: {}
    steps:
      - name: Aggregate required CI results fail closed
        env:
          CORE_QUALITY_RESULT: ${{ needs.core-quality.result }}
          COVERAGE_SONAR_RESULT: ${{ needs.coverage-sonar.result }}
          CROSS_PLATFORM_RESULT: ${{ needs.cross-platform-smoke.result }}
        run: |
          for result in "$CORE_QUALITY_RESULT" "$COVERAGE_SONAR_RESULT" "$CROSS_PLATFORM_RESULT"; do
            if [ "$result" != "success" ]; then
              echo "Required CI dependency did not succeed: $result"
              exit 1
            fi
          done

  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Download and verify actionlint
        run: |
          curl --proto '=https' -sSfL "https://github.com/rhysd/actionlint/releases/download/v1.7.12/actionlint_1.7.12_linux_amd64.tar.gz" -o actionlint.tar.gz
          echo "8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8  actionlint.tar.gz" | sha256sum --check
          tar -xzf actionlint.tar.gz actionlint
          chmod +x actionlint
      - run: ./actionlint -color .github/workflows/*.yml

  verify-pinned-shas:
    name: Verify pinned action SHAs
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.18.0"
          package-manager-cache: false
      - run: npm ci --ignore-scripts
      - run: npm run check:contract

  zizmor:
    name: zizmor
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
        with:
          version: "1.26.1"
          config: .github/zizmor.yml
          advanced-security: false
          annotations: true

  build-scan-sbom-smoke:
    name: Build, scan, SBOM, smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      attestations: write
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.18.0"
          package-manager-cache: false
      - run: npm ci --ignore-scripts
      - run: npm run build
      - run: npm audit --audit-level=high
      - name: Generate CycloneDX SBOM
        run: npm sbom --sbom-format cyclonedx > sbom.cdx.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: keiko-native-bootstrap-sbom
          path: sbom.cdx.json
          retention-days: 90
      - name: Attest SBOM provenance
        if: github.event_name == 'push'
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: sbom.cdx.json

  native:
    name: native
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.18.0"
          package-manager-cache: false
      - run: npm ci --ignore-scripts
      - run: npm run check:contract
      - run: npm run build
