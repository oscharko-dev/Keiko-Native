name: Pull request contract

on:
  pull_request_target:
    branches:
      - dev
      - "epic/**"
    types:
      [
        opened,
        edited,
        reopened,
        synchronize,
        ready_for_review,
        converted_to_draft,
        closed,
      ]

permissions: {}

concurrency:
  group: pr-contract-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  contract:
    name: Evaluate trusted PR metadata
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      issue-number: ${{ steps.contract.outputs.issue-number }}
    permissions:
      contents: read
      issues: read
      pull-requests: read
      statuses: write
    steps:
      - name: Check out the protected governance contract
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false
          ref: dev
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.18.0"
          package-manager-cache: false
      - name: Validate issue, readiness, evidence, and delivery authority
        id: contract
        env:
          GITHUB_TOKEN: ${{ github.token }}
          KEIKO_ISSUE_LIFECYCLE_ACTIVATION: disabled
        run: node quality/pr-contract-action.mjs

  lifecycle:
    name: Serialize inert PR lifecycle transition
    needs: contract
    if: ${{ always() && needs.contract.outputs.issue-number != '' }}
    permissions:
      contents: read
      issues: read
      pull-requests: read
    uses: ./.github/workflows/issue-lifecycle.yml
    with:
      issue_number: ${{ needs.contract.outputs.issue-number }}
      pr_contract_result: ${{ needs.contract.result }}
