name: Issue readiness

on:
  issues:
    types: [closed, edited, labeled, reopened, unlabeled]

permissions: {}

concurrency:
  group: issue-readiness-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate implementation readiness
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      issues: write
      pull-requests: read
      statuses: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24.18.0"
          package-manager-cache: false
      - name: Validate and record the issue contract
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node quality/issue-readiness-action.mjs
