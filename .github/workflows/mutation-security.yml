name: Mutation security

on:
  schedule:
    - cron: "13 1 * * *"
  workflow_dispatch:

permissions: {}

jobs:
  bootstrap-negative-matrix:
    name: Bootstrap negative contract matrix
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.18.0"
          package-manager-cache: false
      - run: npm ci --ignore-scripts
      - run: npm run coverage
      - name: Enforce real mutation testing before productive phase
        run: |
          phase="$(node -p "require('./quality/project.json').phase")"
          if [ "$phase" != "bootstrap" ]; then
            echo "Productive phase requires a language-specific mutation runner."
            exit 1
          fi
