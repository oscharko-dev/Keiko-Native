name: Mutation security

on:
  schedule:
    - cron: "13 1 * * *"
  workflow_dispatch:

permissions: {}

jobs:
  native-mutation-security:
    name: Native mutation security
    runs-on: macos-14
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.18.0"
          package-manager-cache: false
      - name: Install exact Rust and mutation toolchains
        run: |
          rustup toolchain install 1.92.0 --profile minimal
          cargo +1.92.0 install cargo-mutants --version 27.1.0 --locked
      - run: npm ci --ignore-scripts
      - run: npm run coverage
      - name: Run productive Rust mutation suite
        run: >-
          cargo +1.92.0 mutants --manifest-path native/Cargo.toml
          --package keiko-application
          --package keiko-ui-port
          --package keiko-host-macos
          --timeout 120
